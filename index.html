<style>
:root {
  --ink: #4a374a;             /* Deep purple for readability */
  --paper: #fdfaf7;           /* Your existing light paper background */
  --accent-green: #C9E4DE;    /* Pastel Mint */
  --accent-red: #F2C6DE;      /* Pastel Pink */
  --accent-rose: #C6DEF1;     /* Pastel Blue */
  --champagne: #FAEDCB;       /* Pastel Yellow */
  --accent-purple: #DBCDF0;    /* Pastel Purple */
  --accent-orange: #F7D9C4;    /* Pastel Orange */
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html { 
  scroll-behavior: smooth; 
  overflow-x: hidden;
  width: 100%;
  position: relative;
}

body { 
  font-family: "Playfair Display", serif; 
  color: var(--ink); 
  min-height: 100vh; 
  width: 100vw;
  margin: 0;
  padding: 0;
  overflow-x: hidden;
}

body.invite-closed { 
  overflow: hidden; 
  height: 100vh; 
  position: fixed;
}

.content-wrapper { 
  position: relative; 
  z-index: 1; 
  padding-bottom: 120px; 
  width: 100%;
  overflow-x: clip;
}
  
section { padding: 40px 20px; display: flex; justify-content: center; text-align: center; }

.card {
  background: var(--paper); padding: 10% 5%; width: 100%; max-width: 800px;
  border-radius: 4px; box-shadow: 0 0 0 1px rgba(0,0,0,0.03), 0 10px 30px rgba(0,0,0,0.05);
  overflow: hidden;
}

.card img {
  width: 101%; margin-left: -0.5%; max-width: 101%; height: auto;
  display: block; border-radius: 2px; object-fit: cover; 
  background-color: var(--paper); outline: 2px solid var(--paper); outline-offset: -2px;
}

#Boba img, #with-love img, #giving img {
  width: 80% !important; 
  max-width: 500px !important;
  margin: 20px auto !important; 
  outline: none !important;
  object-fit: contain !important;
  display: block;
}
  
.carousel img {
  width: 70vw !important; margin: 0 !important; outline: none !important;
}

p { font-size: clamp(16px, 1.1rem, 19px); line-height: 1.6; max-width: 100%; margin: 0 auto 1.2em auto; }

h1 { font-size: clamp(28px, 6vw, 48px); line-height: 1.1; margin-bottom: 24px; font-weight: 400; color: var(--ink); }
#hero h1 { margin-bottom: 2px; }
#hero h1:last-of-type { margin-bottom: 24px; }

h2 { font-size: clamp(18px, 4vw, 22px); text-transform: uppercase; letter-spacing: 0.2em; margin-bottom: 20px; color: var(--accent-green); }
h3 { font-size: 18px; text-transform: uppercase; letter-spacing: 0.1em; margin: 25px 0 10px 0; color: var(--accent-red); }

.schedule-item { margin-bottom: 25px; }
.time { font-weight: 600; color: var(--accent-green); display: block; margin-bottom: 5px; }

#countdown { margin-top: 20px; display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
.count { padding: 10px; min-width: 70px; border-bottom: 2px solid var(--accent-red); }
.count span { font-size: 28px; display: block; font-weight: 600; color: var(--accent-red); }
.count-label { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }

.carousel-container { margin: 30px -5% 0 -5%; overflow: hidden; }
.carousel { display: flex; gap: 12px; overflow-x: auto; padding: 0 10% 20px 10%; scroll-snap-type: x mandatory; scrollbar-width: none; }

.btn {
  display: inline-block; margin-top: 15px; padding: 15px 35px; background-color: var(--accent-red); color: #fff;
  border: none; border-radius: 2px; text-decoration: none; text-transform: uppercase; font-size: 13px; letter-spacing: 2px;
  font-weight: 600; cursor: pointer;
}

nav {
  position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(255, 255, 255, 0.8);
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  display: none; justify-content: space-around; align-items: stretch; height: 65px; 
  padding-bottom: env(safe-area-inset-bottom); border-top: 1px solid rgba(0,0,0,0.05); z-index: 1000;
}

nav a {
  flex: 1; display: flex; align-items: center; justify-content: center;
  text-decoration: none; color: var(--ink); font-size: 11px; letter-spacing: 1px; font-weight: 600; text-transform: uppercase;
}

#envelope {
  position: fixed; inset: 0; display: flex; justify-content: center; align-items: center;
  background: var(--champagne);
  z-index: 99999; transition: opacity 0.8s ease;
}

.seal {
  width: 300px; height: 300px; background-color: var(--accent-red); border-radius: 50%;
  cursor: pointer; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.1)); 
  animation: breathe 3s infinite ease-in-out; display: flex; align-items: center; justify-content: center; color: white;
}
@media(min-width:601px) { .seal { width: 400px; height: 400px; } }
@keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.04); } }

.video-container { position: relative; width: 100%; max-width: 315px; margin: 30px auto 0; aspect-ratio: 9 / 16; border-radius: 8px; overflow: hidden; }

.bg-fixed {
  position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
  z-index: -1; background-color: var(--paper);
  pointer-events: none;
}
</style>
