<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Richard & Janine</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">

<style>
  :root {
    --white: #ffffff;
    --accent-red: #D8A4A4;
    --accent-green: #7A9E96;
    --ink: #333;
    --main-font: 'Fredoka One', cursive;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { 
    width: 100%; 
    min-height: 100vh;
    font-family: var(--main-font);
    background-color: #fdfbf7;
    overflow-x: hidden;
  }

  body.invite-closed { overflow: hidden; height: 100vh; }

  .content-wrapper { width: 100%; padding: 20px; padding-bottom: 120px; }
  
  section { display: flex; justify-content: center; margin-bottom: 20px; }

  .card {
    background: var(--white); /* Solid white, no transparency */
    width: 100%; 
    max-width: 600px; 
    padding: 30px;
    border-radius: 15px; 
    box-shadow: 0 4px 15px rgba(0,0,0,0.1); /* Standard shadow, not wonky */
    text-align: center;
  }

  /* Centered images */
  .card img { 
    display: block; 
    margin: 20px auto; 
    max-width: 100%; 
    height: auto; 
    border-radius: 8px;
  }

  h1 { font-size: 28px; margin-bottom: 15px; color: var(--ink); }
  h2 { font-size: 18px; color: var(--accent-green); margin-bottom: 10px; }
  p { font-size: 18px; line-height: 1.6; color: #555; margin-bottom: 20px; }

  .btn {
    display: inline-block; padding: 15px 30px; background: var(--accent-red);
    color: white; text-decoration: none; font-size: 16px; border-radius: 50px;
  }

  #envelope {
    position: fixed; inset: 0; display: flex; justify-content: center; align-items: center;
    background: #fdfbf7; z-index: 9999; transition: opacity 0.8s ease;
  }
</style>
</head>

<body class="invite-closed">

<div id="envelope">
  <div style="cursor: pointer; text-align: center;" onclick="openInvite()">
    <div style="font-size: 80px;">🎈</div>
    <p>Pop to enter</p>
  </div>
</div>

<div class="content-wrapper">
  <section>
    <div class="card">
      <img src="bunting.jpeg" alt="Bunting">
      <h2>One Baby Shower and Two Birthdays</h2>
      <h1>Saturday, 8th August 2026</h1>
      <p>Join us at our place for cake, barbeque, and games all in one!</p>
    </div>
  </section>

  <section id="giving">
    <div class="card">
      <h2>Gifting</h2>
      <h1>Things for Baby</h1>
      <img src="toys.jpeg" alt="Baby items">
      <p>Please, no birthday gifts for either of us, your company is all we want!</p>
      <a class="btn" href="https://mycrib.uk/baby-allum-wishlist" target="_blank">Baby Registry</a>
    </div>
  </section>
</div>

<script>
function openInvite() {
  const env = document.getElementById("envelope");
  env.style.opacity = "0";
  setTimeout(() => {
    env.style.display = "none";
    document.body.classList.remove("invite-closed");
  }, 800);
}
</script>

</body>
</html>
